<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>broccoli.</title>
    <meta name="description" content="A minimal 3D Cards Against Humanity game. Join with a code." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230a0a0a'/%3E%3Ccircle cx='8' cy='8' r='3' fill='%23fafafa'/%3E%3C/svg%3E" />
    <style>
      /* Critical inline CSS — kept small so first paint happens with no extra round-trip.
         Everything else is lazy-loaded as scoped Svelte styles. */
      :root {
        --bg: #0a0a0a;
        --ink: #fafafa;
        --ink-dim: #8a8a8a;
        --accent: #fafafa;
        --card-w: #fafafa;
        --card-b: #0a0a0a;
        --line: rgba(250, 250, 250, 0.12);
        --font: 'Helvetica Neue', 'Inter', system-ui, -apple-system, sans-serif;
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font);
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
        min-height: 100vh;
        min-height: 100dvh;
      }
      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        min-height: 100dvh;
      }
      #app {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      /* Tiny pre-paint boot screen that disappears the moment Svelte mounts.
         Pure CSS animation — no JS needed. */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        z-index: 9999;
        pointer-events: none;
        transition: opacity 220ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      #boot.gone { opacity: 0; }
      #boot .dot {
        width: 6px;
        height: 6px;
        background: var(--ink);
        border-radius: 50%;
        animation: bootpulse 1100ms cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
      }
      @keyframes bootpulse {
        0%, 100% { transform: scale(0.6); opacity: 0.35; }
        50% { transform: scale(1.4); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot .dot { animation: none; opacity: 0.7; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot" aria-hidden="true"><div class="dot"></div></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
